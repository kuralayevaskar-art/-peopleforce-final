spring:
  application:
    name: hr-platform-backend
  config:
    import: optional:classpath:application-secrets.properties
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/hr_peopleops}
    username: ${DB_USERNAME:hr_user}
    password: ${DB_PASSWORD:hr_password}
    driver-class-name: ${DB_DRIVER:org.postgresql.Driver}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true

app:
  jwt:
    secret: change-this-secret-in-production-change-this-secret-in-production
    access-token-expiration-minutes: 30
    refresh-token-expiration-days: 14
  ad:
    enabled: ${AD_ENABLED:false}
    url: ${AD_URL:ldap://10.1.10.11:389}
    base-dn: ${AD_BASE_DN:DC=DMUK,DC=EDU}
    bind-dn: ${AD_BIND_DN:zkt@dmuk.edu.kz}
    bind-password: ${AD_BIND_PASSWORD:}
    bind-domain: ${AD_BIND_DOMAIN:dmuk.edu.kz}
    user-filter: ${AD_USER_FILTER:(sAMAccountName={0})}
    group-filter: ${AD_GROUP_FILTER:(&(objectClass=group)(member={0}))}
    default-role-code: ${AD_DEFAULT_ROLE_CODE:HR_ADMIN}
    search-base-dns:
      - OU=Staff,OU=DMUK,DC=DMUK,DC=EDU
      - OU=AcademicStaff,OU=DMUK,DC=DMUK,DC=EDU
  zkteco:
    enabled: ${ZKTECO_SYNC_ENABLED:false}
    host: ${ZKTECO_HOST:10.1.70.2}
    port: ${ZKTECO_PORT:5442}
    database-name: ${ZKTECO_DB_NAME:biosecurity-boot}
    username: ${ZKTECO_USERNAME:}
    password: ${ZKTECO_PASSWORD:}
    photo-root: ${ZKTECO_PHOTO_ROOT:C:/zkt/photos}
    import-batch-size: ${ZKTECO_IMPORT_BATCH_SIZE:500}
  synology:
    enabled: ${SYNOLOGY_ENABLED:false}
    host: ${SYNOLOGY_HOST:10.1.30.49}
    root-path: ${SYNOLOGY_ROOT_PATH:Z:\\Global\\people}
    username: ${SYNOLOGY_USERNAME:}
    password: ${SYNOLOGY_PASSWORD:}
  mail:
    enabled: ${MAIL_ENABLED:false}
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    from: ${MAIL_FROM:no-reply@dmuk.edu.kz}
    start-tls: ${MAIL_STARTTLS:true}
  provisioning:
    default-domain: ${AD_DEFAULT_DOMAIN:dmuk.edu.kz}
    dry-run: ${PROVISIONING_DRY_RUN:true}
    powershell-executable: ${POWERSHELL_EXECUTABLE:powershell.exe}
    ad-target-ou: ${AD_TARGET_OU:}
    default-department: ${AD_DEFAULT_DEPARTMENT:DMUK}
    change-password-at-logon: ${AD_CHANGE_PASSWORD_AT_LOGON:false}
    m365-sync-enabled: ${M365_SYNC_ENABLED:true}
    m365-sync-host: ${M365_SYNC_HOST:}
    m365-sync-username: ${M365_SYNC_USERNAME:}
    m365-sync-password: ${M365_SYNC_PASSWORD:}

server:
  port: 8080
  servlet:
    context-path: /api/v1

logging:
  file:
    path: ${LOG_PATH:C:/people2/finesh/logs}
  level:
    root: INFO
    org.springframework.security: INFO
    org.hibernate.SQL: WARN
    org.flywaydb: INFO
